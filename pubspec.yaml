name: ai_story_video_creator
description: AI powered animated story video creator
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # Google Sign In
  google_sign_in: ^6.1.6

  # HTTP
  http: ^1.1.2
  dio: ^5.4.0

  # Video & Audio
  video_player: ^2.8.1
  just_audio: ^0.9.36

  # TTS
  flutter_tts: ^3.8.5

  # Storage & Files
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # Utils
  uuid: ^4.2.2
  json_annotation: ^4.8.1
  permission_handler: ^11.1.0
  connectivity_plus: ^5.0.2
  logger: ^2.0.2+1

  # UI
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/backgrounds/
    - assets/characters/
    - assets/music/
    - assets/animations/
