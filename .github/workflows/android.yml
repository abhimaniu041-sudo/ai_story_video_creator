name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Create All Generated Files
        run: |
          python3 << 'PYEOF'
          import os, struct, zlib

          # firebase_options.dart
          os.makedirs('lib', exist_ok=True)
          firebase_content = """import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return android;
            }
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'AIzaSyCbqdshQTCfsI_RqYsDU4jy3byBFakNX3k',
              appId: '1:954555401149:android:011c31e9dcdb9d3a4288d4',
              messagingSenderId: '954555401149',
              projectId: 'ai-story-video-creator-f7a2f',
              storageBucket: 'ai-story-video-creator-f7a2f.firebasestorage.app',
            );
          }
          """
          with open('lib/firebase_options.dart', 'w') as f:
              f.write(firebase_content)
          print("Created firebase_options.dart")

          # Asset directories
          for d in ['assets/backgrounds', 'assets/characters', 'assets/music', 'assets/animations', 'assets/fonts']:
              os.makedirs(d, exist_ok=True)
              with open(f'{d}/.gitkeep', 'w') as f:
                  f.write('')
          print("Created asset directories")

          # styles.xml
          os.makedirs('android/app/src/main/res/values', exist_ok=True)
          styles = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          """
          with open('android/app/src/main/res/values/styles.xml', 'w') as f:
              f.write(styles)

          # colors.xml
          colors = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#0A0A0F</color>
          </resources>
          """
          with open('android/app/src/main/res/values/colors.xml', 'w') as f:
              f.write(colors)

          # launch_background.xml
          os.makedirs('android/app/src/main/res/drawable', exist_ok=True)
          launch_bg = """<?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/black" />
          </layer-list>
          """
          with open('android/app/src/main/res/drawable/launch_background.xml', 'w') as f:
              f.write(launch_bg)

          # PNG icon generator
          def create_png(size, output_path):
              def chunk(t, d):
                  c = t + d
                  return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              pixels = []
              half = size // 2
              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      cx, cy = x - half, y - half
                      if cx*cx + cy*cy <= half*half*0.6:
                          row += bytes([255, 107, 53, 255])
                      else:
                          row += bytes([10, 10, 15, 255])
                  pixels.append(row)
              raw = b''.join(pixels)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
              png = (b'\x89PNG\r\n\x1a\n' +
                     chunk(b'IHDR', ihdr) +
                     chunk(b'IDAT', zlib.compress(raw)) +
                     chunk(b'IEND', b''))
              os.makedirs(os.path.dirname(output_path), exist_ok=True)
              with open(output_path, 'wb') as f:
                  f.write(png)
              print(f"Created: {output_path}")

          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          base = 'android/app/src/main/res'
          for density, size in sizes.items():
              create_png(size, f'{base}/mipmap-{density}/ic_launcher.png')
              create_png(size, f'{base}/mipmap-{density}/ic_launcher_round.png')

          print("All files created successfully")
          PYEOF

      - name: Create local.properties
        run: |
          FLUTTER_PATH=$(which flutter | sed 's|/bin/flutter||')
          echo "flutter.sdk=$FLUTTER_PATH" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Debug APK
        run: |
          flutter build apk --debug \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dart-define=HF_API_KEY=${{ secrets.HF_API_KEY }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dart-define=HF_API_KEY=${{ secrets.HF_API_KEY }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-story-video-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-story-video-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: AI Story Video Creator v${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          body: |
            ## AI Story Video Creator
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
