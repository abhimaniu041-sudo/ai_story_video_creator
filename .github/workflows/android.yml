name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Create Firebase Options
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'DART_EOF'
import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

class DefaultFirebaseOptions {
  static FirebaseOptions get currentPlatform {
    return android;
  }
  static const FirebaseOptions android = FirebaseOptions(
    apiKey: 'AIzaSyCbqdshQTCfsI_RqYsDU4jy3byBFakNX3k',
    appId: '1:954555401149:android:011c31e9dcdb9d3a4288d4',
    messagingSenderId: '954555401149',
    projectId: 'ai-story-video-creator-f7a2f',
    storageBucket: 'ai-story-video-creator-f7a2f.firebasestorage.app',
  );
}
DART_EOF

      - name: Create Asset Directories
        run: |
          mkdir -p assets/backgrounds
          mkdir -p assets/characters
          mkdir -p assets/music
          mkdir -p assets/animations
          mkdir -p assets/fonts
          touch assets/backgrounds/.gitkeep
          touch assets/characters/.gitkeep
          touch assets/music/.gitkeep
          touch assets/animations/.gitkeep

      - name: Create Android Resources
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
        <item name="android:windowBackground">@drawable/launch_background</item>
    </style>
    <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
        <item name="android:windowBackground">@android:color/black</item>
    </style>
</resources>
EOF

          cat > android/app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="ic_launcher_background">#0A0A0F</color>
</resources>
EOF

          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<layer-list xmlns:android="http://schemas.android.com/apk/res/android">
    <item android:drawable="@android:color/black" />
</layer-list>
EOF

          python3 << 'PYEOF'
import struct, zlib, os

def create_png(size, output_path):
    def png_chunk(chunk_type, data):
        c = chunk_type + data
        return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
    width = height = size
    pixels = []
    for y in range(height):
        row = b'\x00'
        for x in range(width):
            cx = x - width // 2
            cy = y - height // 2
            if cx*cx + cy*cy <= (width // 2) ** 2 * 0.6:
                row += bytes([255, 107, 53, 255])
            else:
                row += bytes([10, 10, 15, 255])
        pixels.append(row)
    raw = b''.join(pixels)
    compressed = zlib.compress(raw)
    ihdr_data = struct.pack('>IIBBBBB', width, height, 8, 6, 0, 0, 0)
    png = (b'\x89PNG\r\n\x1a\n' +
           png_chunk(b'IHDR', ihdr_data) +
           png_chunk(b'IDAT', compressed) +
           png_chunk(b'IEND', b''))
    os.makedirs(os.path.dirname(output_path), exist_ok=True)
    with open(output_path, 'wb') as f:
        f.write(png)
    print(f"Created: {output_path}")

sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
base = 'android/app/src/main/res'
for density, size in sizes.items():
    create_png(size, f'{base}/mipmap-{density}/ic_launcher.png')
    create_png(size, f'{base}/mipmap-{density}/ic_launcher_round.png')
print("All icons created")
PYEOF

      - name: Create local.properties
        run: |
          FLUTTER_PATH=$(which flutter | sed 's|/bin/flutter||')
          echo "flutter.sdk=$FLUTTER_PATH" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Debug APK
        run: |
          flutter build apk --debug \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dart-define=HF_API_KEY=${{ secrets.HF_API_KEY }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dart-define=HF_API_KEY=${{ secrets.HF_API_KEY }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-story-video-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-story-video-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: AI Story Video Creator v${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          body: |
            ## AI Story Video Creator
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
