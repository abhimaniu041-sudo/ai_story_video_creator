name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Create Firebase Options
        run: |
          cat > lib/firebase_options.dart << 'DART_EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return android;
            }
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'placeholder-key',
              appId: '1:000000000000:android:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'placeholder-project',
              storageBucket: 'placeholder-project.appspot.com',
            );
          }
          DART_EOF

      - name: Create Asset Directories
        run: |
          mkdir -p assets/backgrounds
          mkdir -p assets/characters
          mkdir -p assets/music
          mkdir -p assets/animations
          mkdir -p assets/fonts
          touch assets/backgrounds/.gitkeep
          touch assets/characters/.gitkeep
          touch assets/music/.gitkeep
          touch assets/animations/.gitkeep

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Debug APK
        run: |
          flutter build apk --debug \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dart-define=HF_API_KEY=${{ secrets.HF_API_KEY }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dart-define=HF_API_KEY=${{ secrets.HF_API_KEY }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-story-video-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-story-video-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: AI Story Video Creator v${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          body: |
            ## AI Story Video Creator
            Build Number: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            ### Download
            - **app-release.apk** - Production build
            - **app-debug.apk** - Debug build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
